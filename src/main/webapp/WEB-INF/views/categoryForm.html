<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>새 카테고리 등록</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input[type="text"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .btn { padding: 10px 20px; background: #4a90d9; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .error-msg { color: red; font-size: 0.9em; margin-top: 5px; display: block; }
    </style>
</head>
<body>
<h1>새 카테고리 등록</h1>

<a th:href="@{/categories}" style="display: inline-block; margin-bottom: 20px;">← 카테고리 목록으로 돌아가기</a>

<form th:action="@{/categories/create}" th:object="${categoryForm}" method="post">

    <div class="form-group">
        <label for="name">카테고리 이름</label>
        <input type="text" th:field="*{name}" placeholder="예: 전자기기, 도서 등"/>

        <span class="error-msg" th:if="${#fields.hasErrors('name')}" th:errors="*{name}">이름 오류 메시지</span>
    </div>

    <button type="submit" class="btn">등록하기</button>
</form>

<hr style="margin-top: 40px;">
<footer style="text-align: center; color: #555; padding: 20px;">
    <p>
        <span th:text="${'실습 수행 일시: ' + #temporals.format(#temporals.createNow(), 'yyyy-MM-dd HH:mm:ss')}"></span>
        | 학번: 2371343 | 성명: 김소미
    </p>
</footer>
</body>
</html>

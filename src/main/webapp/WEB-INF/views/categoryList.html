<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>카테고리 관리</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        .btn { padding: 8px 16px; background: #4a90d9; color: white; text-decoration: none; border-radius: 4px; }
        .alert { padding: 10px; margin-bottom: 20px; border-radius: 4px; }
        .alert-success { background: #d4edda; color: #155724; }
        .alert-error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
<h1>카테고리 목록</h1>
<div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
<div th:if="${errorMessage}" class="alert alert-error" th:text="${errorMessage}"></div>

<a class="btn" th:href="@{/categories/create}">+ 새 카테고리 등록</a>

<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>카테고리명</th>
        <th>작업</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="cat : ${categories}">
        <td th:text="${cat.id}"></td>
        <td th:text="${cat.name}"></td>
        <td>
            <form th:action="@{/categories/{id}/delete(id=${cat.id})}" method="post" onsubmit="return confirm('삭제하시겠습니까?');">
                <button type="submit" style="color: red; border: none; background: none; cursor: pointer; text-decoration: underline;">삭제</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>

<a th:href="@{/products}" style="display: block; margin-top: 20px;">← 상품 목록으로 돌아가기</a>

<hr>
<footer style="text-align: center; color: #555; padding: 20px;">
    <p>
        <span th:text="${'실습 수행 일시: ' + #temporals.format(#temporals.createNow(), 'yyyy-MM-dd HH:mm:ss')}"></span>
        | 학번: 2371343 | 성명: 김소미
    </p>
</footer>
</body>
</html>
